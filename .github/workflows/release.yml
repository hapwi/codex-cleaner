name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --repo "$REPO" --title "$TAG_NAME" --latest
          else
            gh release create "$TAG_NAME" --repo "$REPO" --title "$TAG_NAME" --generate-notes --latest --verify-tag
          fi
